<svg width="1400" height="720" viewBox="0 0 1400 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="118" y1="24" x2="1258" y2="688" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F4FBFF"/>
      <stop offset="1" stop-color="#FFF7EA"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0 0L14 7L0 14V0Z" fill="#0C2D48"/>
    </marker>
  </defs>

  <rect width="1400" height="720" rx="30" fill="url(#bg)"/>
  <text x="88" y="84" fill="#0C2D48" font-size="40" font-family="Avenir Next, Segoe UI, sans-serif" font-weight="800">Eval Pipeline and CI Gate</text>
  <text x="88" y="120" fill="#4B6478" font-size="20" font-family="Avenir Next, Segoe UI, sans-serif">Benchmark seeded cases, score outcomes, then decide whether CI should pass the gate.</text>

  <g filter="url(#shadow)">
    <rect x="88" y="210" width="220" height="264" rx="28" fill="white"/>
    <rect x="112" y="234" width="172" height="56" rx="18" fill="#D7ECFF"/>
    <text x="152" y="269" fill="#0B4F7A" font-size="25" font-family="Avenir Next, Segoe UI, sans-serif" font-weight="800">Benchmarks</text>
    <text x="120" y="338" fill="#27445D" font-size="20" font-family="Avenir Next, Segoe UI, sans-serif" font-weight="700">Seeded eval cases</text>
    <text x="120" y="372" fill="#4B6478" font-size="18" font-family="Avenir Next, Segoe UI, sans-serif">PR impact, reviewer fit, policy correctness, and risk quality baselines.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="362" y="210" width="244" height="264" rx="28" fill="white"/>
    <rect x="386" y="234" width="196" height="56" rx="18" fill="#D1F3E2"/>
    <text x="446" y="269" fill="#16614A" font-size="25" font-family="Avenir Next, Segoe UI, sans-serif" font-weight="800">Run</text>
    <text x="394" y="338" fill="#27445D" font-size="20" font-family="Avenir Next, Segoe UI, sans-serif" font-weight="700">POST /evals/run</text>
    <text x="394" y="372" fill="#4B6478" font-size="18" font-family="Avenir Next, Segoe UI, sans-serif">Execute deterministic scoring over the current implementation.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="660" y="210" width="274" height="264" rx="28" fill="white"/>
    <rect x="684" y="234" width="226" height="56" rx="18" fill="#FFE1D8"/>
    <text x="744" y="269" fill="#C2410C" font-size="25" font-family="Avenir Next, Segoe UI, sans-serif" font-weight="800">Checks</text>
    <text x="692" y="338" fill="#27445D" font-size="20" font-family="Avenir Next, Segoe UI, sans-serif" font-weight="700">Impact, policy, and risk metrics</text>
    <text x="692" y="372" fill="#4B6478" font-size="18" font-family="Avenir Next, Segoe UI, sans-serif">Compute pass rate, scoring drift, and benchmark-specific diagnostics.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="988" y="210" width="324" height="264" rx="28" fill="white"/>
    <rect x="1012" y="234" width="276" height="56" rx="18" fill="#FFF1CD"/>
    <text x="1070" y="269" fill="#B45309" font-size="25" font-family="Avenir Next, Segoe UI, sans-serif" font-weight="800">Score and Store</text>
    <text x="1020" y="338" fill="#27445D" font-size="20" font-family="Avenir Next, Segoe UI, sans-serif" font-weight="700">Persist run history and threshold result</text>
    <text x="1020" y="372" fill="#4B6478" font-size="18" font-family="Avenir Next, Segoe UI, sans-serif">The outcome becomes both operator evidence and an automated CI gating signal.</text>
  </g>

  <line x1="308" y1="342" x2="362" y2="342" stroke="#0C2D48" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="606" y1="342" x2="660" y2="342" stroke="#0C2D48" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="934" y1="342" x2="988" y2="342" stroke="#0C2D48" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="394" y="542" width="612" height="112" rx="30" fill="#0C2D48"/>
    <text x="430" y="586" fill="#EFF7FF" font-size="28" font-family="Avenir Next, Segoe UI, sans-serif" font-weight="800">CI Gate Outcome</text>
    <text x="430" y="622" fill="#B7DDF7" font-size="18" font-family="Avenir Next, Segoe UI, sans-serif">Pass when thresholds are met. Fail the gate when recommendation quality or policy correctness regresses.</text>
  </g>
</svg>
