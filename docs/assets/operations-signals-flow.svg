<svg width="1400" height="720" viewBox="0 0 1400 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="136" y1="42" x2="1262" y2="692" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F5FBFF"/>
      <stop offset="1" stop-color="#FFF8EE"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0 0L14 7L0 14V0Z" fill="#0C2D48"/>
    </marker>
  </defs>

  <rect width="1400" height="720" rx="30" fill="url(#bg)"/>
  <text x="88" y="84" fill="#0C2D48" font-size="40" font-family="Avenir Next, Segoe UI, sans-serif" font-weight="800">Test and CI Intelligence Flow</text>
  <text x="88" y="120" fill="#4B6478" font-size="20" font-family="Avenir Next, Segoe UI, sans-serif">Operational signals are merged into one evidence stream before they influence risk and release decisions.</text>

  <g filter="url(#shadow)">
    <rect x="88" y="208" width="246" height="248" rx="28" fill="white"/>
    <rect x="112" y="232" width="198" height="56" rx="18" fill="#D7ECFF"/>
    <text x="159" y="267" fill="#0B4F7A" font-size="25" font-family="Avenir Next, Segoe UI, sans-serif" font-weight="800">Test runs</text>
    <text x="120" y="340" fill="#27445D" font-size="20" font-family="Avenir Next, Segoe UI, sans-serif" font-weight="700">Coverage and flakes</text>
    <text x="120" y="374" fill="#4B6478" font-size="18" font-family="Avenir Next, Segoe UI, sans-serif">Failed, flaky, or missing tests are preserved as explicit evidence.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="382" y="208" width="246" height="248" rx="28" fill="white"/>
    <rect x="406" y="232" width="198" height="56" rx="18" fill="#FFE1D8"/>
    <text x="464" y="267" fill="#C2410C" font-size="25" font-family="Avenir Next, Segoe UI, sans-serif" font-weight="800">CI jobs</text>
    <text x="414" y="340" fill="#27445D" font-size="20" font-family="Avenir Next, Segoe UI, sans-serif" font-weight="700">Failures and retries</text>
    <text x="414" y="374" fill="#4B6478" font-size="18" font-family="Avenir Next, Segoe UI, sans-serif">Unstable pipelines and red builds are normalized into durable diagnostics.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="676" y="178" width="292" height="308" rx="30" fill="white"/>
    <rect x="700" y="202" width="244" height="60" rx="18" fill="#D1F3E2"/>
    <text x="739" y="239" fill="#16614A" font-size="26" font-family="Avenir Next, Segoe UI, sans-serif" font-weight="800">Signal Aggregation</text>
    <text x="708" y="328" fill="#27445D" font-size="20" font-family="Avenir Next, Segoe UI, sans-serif" font-weight="700">Join tests, CI, and historical context</text>
    <text x="708" y="362" fill="#4B6478" font-size="18" font-family="Avenir Next, Segoe UI, sans-serif">A single operator view removes the need to inspect multiple disconnected tools.</text>
    <rect x="708" y="410" width="146" height="30" rx="15" fill="#FFF1CD"/>
    <text x="733" y="430" fill="#9A6700" font-size="14" font-family="IBM Plex Mono, Menlo, monospace">confidence</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1016" y="208" width="296" height="248" rx="28" fill="white"/>
    <rect x="1040" y="232" width="248" height="56" rx="18" fill="#FFF1CD"/>
    <text x="1081" y="267" fill="#B45309" font-size="25" font-family="Avenir Next, Segoe UI, sans-serif" font-weight="800">Outputs</text>
    <text x="1048" y="340" fill="#27445D" font-size="20" font-family="Avenir Next, Segoe UI, sans-serif" font-weight="700">Risk adjustment and diagnostics</text>
    <text x="1048" y="374" fill="#4B6478" font-size="18" font-family="Avenir Next, Segoe UI, sans-serif">The final signals shape risk confidence and populate the PR and release panels.</text>
  </g>

  <line x1="334" y1="332" x2="676" y2="332" stroke="#0C2D48" stroke-width="5" stroke-linecap="round"/>
  <line x1="628" y1="332" x2="676" y2="332" stroke="#0C2D48" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="968" y1="332" x2="1016" y2="332" stroke="#0C2D48" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="388" y="536" width="626" height="104" rx="28" fill="#0C2D48"/>
    <text x="424" y="578" fill="#EFF7FF" font-size="26" font-family="Avenir Next, Segoe UI, sans-serif" font-weight="800">Result</text>
    <text x="424" y="612" fill="#B7DDF7" font-size="18" font-family="Avenir Next, Segoe UI, sans-serif">CI and test signals stop being hidden implementation details and become release-governing evidence.</text>
  </g>
</svg>
