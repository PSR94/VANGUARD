<svg width="1400" height="860" viewBox="0 0 1400 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="168" y1="30" x2="1232" y2="828" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EFF7FF"/>
      <stop offset="1" stop-color="#FFF8ED"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0 0L14 7L0 14V0Z" fill="#0C2D48"/>
    </marker>
    <marker id="arrowWarm" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0 0L14 7L0 14V0Z" fill="#C2410C"/>
    </marker>
  </defs>

  <rect width="1400" height="860" rx="30" fill="url(#bg)"/>
  <text x="88" y="86" fill="#0C2D48" font-size="40" font-family="Avenir Next, Segoe UI, sans-serif" font-weight="800">Release Readiness and Approval Flow</text>
  <text x="88" y="122" fill="#4B6478" font-size="20" font-family="Avenir Next, Segoe UI, sans-serif">A decision path that makes blockers, approvals, and overrides explicit before a release ships.</text>

  <g filter="url(#shadow)">
    <rect x="520" y="166" width="360" height="110" rx="28" fill="white"/>
    <rect x="546" y="190" width="308" height="62" rx="20" fill="#D7ECFF"/>
    <text x="618" y="229" fill="#0B4F7A" font-size="28" font-family="Avenir Next, Segoe UI, sans-serif" font-weight="800">Merged PR candidates</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="478" y="332" width="444" height="128" rx="30" fill="white"/>
    <rect x="504" y="358" width="392" height="76" rx="22" fill="#0C2D48"/>
    <text x="578" y="404" fill="#EFF7FF" font-size="30" font-family="Avenir Next, Segoe UI, sans-serif" font-weight="800">Compute readiness score</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="176" y="540" width="424" height="146" rx="30" fill="white"/>
    <rect x="202" y="566" width="372" height="94" rx="22" fill="#FFE1D8"/>
    <text x="246" y="608" fill="#C2410C" font-size="26" font-family="Avenir Next, Segoe UI, sans-serif" font-weight="800">High risk unresolved?</text>
    <text x="246" y="640" fill="#9A3412" font-size="18" font-family="Avenir Next, Segoe UI, sans-serif">Blockers, unstable CI, or critical policy debt remain.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="800" y="540" width="424" height="146" rx="30" fill="white"/>
    <rect x="826" y="566" width="372" height="94" rx="22" fill="#D1F3E2"/>
    <text x="855" y="608" fill="#16614A" font-size="26" font-family="Avenir Next, Segoe UI, sans-serif" font-weight="800">Required approvals complete?</text>
    <text x="855" y="640" fill="#16614A" font-size="18" font-family="Avenir Next, Segoe UI, sans-serif">Platform, security, and release owner sign-offs are checked.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="140" y="734" width="286" height="84" rx="24" fill="#FFF0EA"/>
    <text x="214" y="786" fill="#C2410C" font-size="28" font-family="Avenir Next, Segoe UI, sans-serif" font-weight="800">Block release</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="550" y="724" width="300" height="104" rx="28" fill="white"/>
    <rect x="576" y="750" width="248" height="52" rx="18" fill="#FFF1CD"/>
    <text x="628" y="783" fill="#B45309" font-size="24" font-family="Avenir Next, Segoe UI, sans-serif" font-weight="800">Override with rationale?</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="994" y="734" width="256" height="84" rx="24" fill="#DFF8EA"/>
    <text x="1050" y="786" fill="#16614A" font-size="28" font-family="Avenir Next, Segoe UI, sans-serif" font-weight="800">Release ready</text>
  </g>

  <line x1="700" y1="276" x2="700" y2="332" stroke="#0C2D48" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="700" y1="460" x2="700" y2="500" stroke="#0C2D48" stroke-width="6" stroke-linecap="round"/>
  <line x1="700" y1="500" x2="388" y2="500" stroke="#0C2D48" stroke-width="5" stroke-linecap="round"/>
  <line x1="700" y1="500" x2="1012" y2="500" stroke="#0C2D48" stroke-width="5" stroke-linecap="round"/>
  <line x1="388" y1="500" x2="388" y2="540" stroke="#0C2D48" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="1012" y1="500" x2="1012" y2="540" stroke="#0C2D48" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <path d="M388 686V716H283V734" stroke="#C2410C" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowWarm)"/>
  <path d="M1012 686V712H1122V734" stroke="#16614A" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M388 686V724H700" stroke="#B45309" stroke-width="5" stroke-linecap="round"/>
  <path d="M700 724V724" stroke="#B45309" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowWarm)"/>
  <path d="M850 776H994" stroke="#16614A" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <text x="322" y="522" fill="#C2410C" font-size="16" font-family="IBM Plex Mono, Menlo, monospace" font-weight="700">yes</text>
  <text x="1034" y="522" fill="#16614A" font-size="16" font-family="IBM Plex Mono, Menlo, monospace" font-weight="700">no</text>
  <text x="418" y="712" fill="#B45309" font-size="16" font-family="IBM Plex Mono, Menlo, monospace" font-weight="700">needs override</text>
  <text x="900" y="766" fill="#16614A" font-size="16" font-family="IBM Plex Mono, Menlo, monospace" font-weight="700">approved</text>
</svg>
