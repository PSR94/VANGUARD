name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install API dependencies
        run: uv pip install --system -e .[dev]

      - name: Lint API
        run: ruff check .

      - name: Run API tests
        run: pytest -q

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

  web-smoke:
    runs-on: ubuntu-latest
    needs:
      - api
      - web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install API dependencies
        working-directory: apps/api
        run: uv pip install --system -e .[dev]

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build web app
        working-directory: apps/web
        run: npm run build

      - name: Install Playwright browser
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Start API server
        working-directory: apps/api
        run: |
          uv run uvicorn app.main:app --host 127.0.0.1 --port 8080 > /tmp/vanguard-api.log 2>&1 &

      - name: Start web server
        working-directory: apps/web
        run: |
          NEXT_PUBLIC_API_BASE_URL=http://localhost:8080 npm run start > /tmp/vanguard-web.log 2>&1 &

      - name: Wait for local services
        run: |
          for attempt in $(seq 1 60); do
            if curl -sf http://127.0.0.1:8080/health > /dev/null && curl -sf http://127.0.0.1:3000 > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "API log:"
          cat /tmp/vanguard-api.log || true
          echo "Web log:"
          cat /tmp/vanguard-web.log || true
          exit 1

      - name: Run operator route smoke checks
        working-directory: apps/web
        run: npm run smoke
